<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1024" height="1024" fill="#070910" rx="180"/>

  <!-- Screen face (fill only, no border — border comes from bezel below) -->
  <rect x="234" y="140" width="556" height="384" rx="20" fill="#0a2a20"/>
  <!-- Teal header bar -->
  <rect x="234" y="140" width="556" height="42" rx="16" fill="#3DFFCC"/>
  <!-- Title line -->
  <line x1="258" y1="222" x2="520" y2="222" stroke="#3DFFCC" stroke-width="14" stroke-linecap="round" opacity="0.7"/>
  <!-- Subtitle line -->
  <line x1="258" y1="262" x2="446" y2="262" stroke="#3DFFCC" stroke-width="10" stroke-linecap="round" opacity="0.4"/>
  <!-- Divider -->
  <line x1="234" y1="298" x2="790" y2="298" stroke="#1E3A5F" stroke-width="6" opacity="0.8"/>
  <!-- Bar chart -->
  <rect x="270" y="318" width="72" height="138" rx="12" fill="#3DFFCC" opacity="0.25"/>
  <rect x="366" y="352" width="72" height="104" rx="12" fill="#3DFFCC" opacity="0.45"/>
  <rect x="462" y="302" width="72" height="154" rx="12" fill="#3DFFCC" opacity="0.9"/>
  <rect x="558" y="330" width="72" height="126" rx="12" fill="#3DFFCC" opacity="0.6"/>
  <rect x="654" y="360" width="72" height="96" rx="12" fill="#3DFFCC" opacity="0.35"/>
  <!-- Baseline -->
  <line x1="270" y1="458" x2="726" y2="458" stroke="#3DFFCC" stroke-width="5" opacity="0.25"/>

  <!-- Screen bezel — chunky white outline -->
  <rect x="202" y="108" width="620" height="472" rx="40" fill="none" stroke="white" stroke-width="36"/>

  <!-- Neck -->
  <line x1="512" y1="576" x2="512" y2="700" stroke="white" stroke-width="36" stroke-linecap="round"/>
  <!-- Left leg -->
  <line x1="490" y1="670" x2="310" y2="900" stroke="white" stroke-width="36" stroke-linecap="round"/>
  <!-- Right leg -->
  <line x1="534" y1="670" x2="714" y2="900" stroke="white" stroke-width="36" stroke-linecap="round"/>
  <!-- Base rail -->
  <line x1="280" y1="900" x2="744" y2="900" stroke="white" stroke-width="16" stroke-linecap="round"/>
</svg>
